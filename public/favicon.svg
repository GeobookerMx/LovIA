<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fondo oscuro con gradiente profundo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0B2A"/>
      <stop offset="100%" stop-color="#1C0A30"/>
    </linearGradient>
    <!-- Corazón: rosa vibrante → crimson -->
    <linearGradient id="hg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#FF8FA3"/>
      <stop offset="40%"  stop-color="#FF4D6D"/>
      <stop offset="100%" stop-color="#C9184A"/>
    </linearGradient>
    <!-- Brillo interior (highlight 3D) -->
    <radialGradient id="hl" cx="38%" cy="32%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Sombra difusa del corazón (glow externo) -->
    <filter id="glow" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado (app icon shape) -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Corazón — capa glow (detrás, difusa) -->
  <path d="M256,420 C180,360 100,300 100,220 C100,170 140,130 190,130 C220,130 245,148 256,170 C267,148 292,130 322,130 C372,130 412,170 412,220 C412,300 332,360 256,420Z"
        fill="#FF4D6D" opacity="0.45" filter="url(#glow)"/>

  <!-- Corazón — capa principal con gradiente -->
  <path d="M256,420 C180,360 100,300 100,220 C100,170 140,130 190,130 C220,130 245,148 256,170 C267,148 292,130 322,130 C372,130 412,170 412,220 C412,300 332,360 256,420Z"
        fill="url(#hg)"/>

  <!-- Highlight 3D — brillo superior izquierdo -->
  <path d="M256,420 C180,360 100,300 100,220 C100,170 140,130 190,130 C220,130 245,148 256,170 C267,148 292,130 322,130 C372,130 412,170 412,220 C412,300 332,360 256,420Z"
        fill="url(#hl)"/>

  <!-- Texto "IA" — sutil, dentro del corazón, posición baja -->
  <text x="256" y="348"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="72"
        font-weight="800"
        fill="#ffffff"
        fill-opacity="0.22"
        text-anchor="middle"
        letter-spacing="6">IA</text>
</svg>
