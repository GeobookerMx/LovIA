[build]
  command = "npm run build"
  publish = "dist"

  # Variables de entorno para producción — se sobreescriben en el panel de Netlify
  # VITE_DEV_BYPASS DEBE ser "false" en producción

# ── Dominio canónico ──────────────────────────────────────────────────────────
[[redirects]]
  from = "https://lovia.com.mx/*"
  to   = "https://www.lovia.com.mx/:splat"
  status = 301
  force  = true

# ── SPA fallback (React Router) ───────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers de seguridad ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-DNS-Prefetch-Control     = "on"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    # Geolocalización para Radar, cámara/micrófono para videollamadas WebRTC
    Permissions-Policy         = "geolocation=(self), camera=(self), microphone=(self), payment=(self)"
    # CSP — 'unsafe-inline' en scripts es requerido por vite-plugin-pwa (inyección de SW)
    # y por Stripe.js. En el futuro migrar a nonces cuando se use SSR.
    Content-Security-Policy    = "default-src 'none'; base-uri 'self'; form-action 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.mercadopago.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://js.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; worker-src blob:; media-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests;"

# ── Cache de assets estáticos ─────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=3600"
