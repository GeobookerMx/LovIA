[build]
  command = "npm run build"
  publish = "dist"

  # Variables de entorno para producción — se sobreescriben en el panel de Netlify
  # VITE_DEV_BYPASS DEBE ser "false" en producción

# ── Archivos estáticos críticos — DEBEN ir ANTES del redirect canónico ──────
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
  force  = true

[[redirects]]
  from   = "/robots.txt"
  to     = "/robots.txt"
  status = 200
  force  = true

# Página de privacidad pública (Google Play y App Store la requieren accesible sin login)
[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200
  force  = true

# assetlinks para TWA / Capacitor Android (Digital Asset Links)
[[redirects]]
  from   = "/.well-known/assetlinks.json"
  to     = "/.well-known/assetlinks.json"
  status = 200
  force  = true

# ── Dominio canónico ──────────────────────────────────────────────────────────
[[redirects]]
  from = "https://lovia.com.mx/*"
  to   = "https://www.lovia.com.mx/:splat"
  status = 301
  force  = true

# ── SPA fallback (React Router) ───────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers de seguridad ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-DNS-Prefetch-Control     = "on"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    # Geolocalización para Radar, cámara/micrófono para videollamadas WebRTC
    Permissions-Policy         = "geolocation=(self), camera=(self), microphone=(self), payment=(self)"
    # CSP — 'unsafe-inline' en scripts es requerido por vite-plugin-pwa (inyección de SW)
    # y por Stripe.js. En el futuro migrar a nonces cuando se use SSR.
    Content-Security-Policy    = "default-src 'none'; base-uri 'self'; form-action 'self' https://appleid.apple.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.mercadopago.com https://appleid.apple.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://js.stripe.com https://appleid.cdn-apple.com; frame-src https://js.stripe.com https://hooks.stripe.com https://appleid.apple.com; worker-src blob:; media-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests;"

# ── Cache de assets estáticos ─────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
